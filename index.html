<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Cheaper Brothers | 廉兄集团</title>
    <link rel="stylesheet" href="common.css">
    <style>
        :root { --bg-color: #000000; --main-color: #ffffff; }
        body { margin: 0; height: 100vh; display: flex; flex-direction: column; background-color: var(--bg-color); color: var(--main-color); font-family: "Manufacturing Consent", "Inter", sans-serif; overflow: hidden; -webkit-font-smoothing: antialiased; }
        .main-content { flex: 1; display: flex; flex-direction: column; justify-content: center; align-items: center; width: 100%; }
        .fuzzy-container { display: flex; flex-direction: column; align-items: center; gap: 1vh; transition: opacity 0.5s ease; }
        canvas { cursor: pointer; max-width: 90vw; display: block; }
        #font-loader { position: absolute; opacity: 0; pointer-events: none; font-family: "Manufacturing Consent"; }
    </style>
</head>
<body>

<div id="font-loader">Force Font Load</div>

<main class="main-content">
    <div class="fuzzy-container" id="canvas-stage" style="opacity: 0;">
        <canvas id="fuzzy-text-1"></canvas>
        <canvas id="fuzzy-text-2"></canvas>
    </div>
</main>

<script src="common.js"></script>
<script>
    renderGlobalUI(''); // 根目录传空字符串

    const initHome = () => {
        const commonConfig = { fontFamily: "Manufacturing Consent", fontWeight: 400, color: '#ffffff', baseIntensity: 0.15, hoverIntensity: 0.5, fuzzRange: 30 };
        new FuzzyText('fuzzy-text-1', { ...commonConfig, text: "CHEAPER", fontSize: 80 });
        new FuzzyText('fuzzy-text-2', { ...commonConfig, text: "BROTHERS", fontSize: 80 });
        document.getElementById('canvas-stage').style.opacity = '1';
    };

    if (document.fonts) { document.fonts.ready.then(() => { initHome(); }).catch(() => { initHome(); }); } 
    else { window.onload = initHome; }

    document.body.addEventListener('touchmove', (e) => {
        if (e.target.tagName !== 'A' && e.target.tagName !== 'LI') { e.preventDefault(); }
    }, { passive: false });
</script>
</body>
</html>
