<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>About - Cheaper Brothers</title>
    <link rel="stylesheet" href="common.css">
    <style>
        body { margin: 0; height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center; background-color: #000; overflow: hidden; color: #fff; font-family: "Inter", sans-serif; }
        #receipt-container { position: fixed; top: -115vh; left: 0; width: 100vw; height: 100vh; z-index: 2; pointer-events: none; transition: top 1s cubic-bezier(0.22, 1, 0.36, 1); }
        #receipt-container.active { top: 0; pointer-events: auto; }
        .about-main { display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; width: 90%; max-width: 800px; z-index: 1; transition: opacity 0.6s ease; }
        canvas#fuzzy-about { cursor: pointer; max-width: 100%; -webkit-tap-highlight-color: transparent; }
        .about-subtitle { font-family: "Alumni Sans Pinstripe", sans-serif; font-size: clamp(1.5rem, 6vw, 2.5rem); letter-spacing: 4px; text-transform: uppercase; margin: 10px 0 20px; opacity: 0.7; }
        .about-body { font-family: "Noto Serif TC", serif; font-size: clamp(0.85rem, 3.5vw, 1rem); line-height: 1.8; opacity: 0.6; max-width: 500px; }
        footer { position: absolute; bottom: 30px; z-index: 5; }
        .font-preload { font-family: "Manufacturing Consent"; position: absolute; opacity: 0; pointer-events: none; }
    </style>
</head>
<body>

<div class="font-preload">Load Font</div>
<div id="receipt-container"></div>

<nav class="nav-wrapper" id="navWrapper">
    </nav>

<div class="about-main" id="about-content">
    <canvas id="fuzzy-about"></canvas>
    <div class="about-subtitle">Who The Hell Are We</div>
    <div class="about-body">
        Cheaper Brothers is not a brand. It's an attitude towards life.<br>
        Born from low budgets, high confidence, and zero market research.
    </div>
</div>

<footer class="global-footer"><a href="index.html">Cheaper Brothers Co. 廉兄集团</a></footer>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="common.js"></script>

<script>
    new FuzzyText('fuzzy-about', { fontFamily: "Manufacturing Consent", text: "ABOUT", fontSize: 140, baseIntensity: 0.15 });

    const ReceiptEngine = (() => {
        const DAMPING = 0.94; // 稍微增加阻尼，让手机端摆动更稳
        const TIMESTEP = 16 / 1000;
        const GRAVITY = new THREE.Vector3(0, -75, 0);
        // 手机端适当减少分段数 (Segs) 可以大幅提升帧率
        const isMobile = window.innerWidth < 768;
        const xSegs = isMobile ? 10 : 15; 
        const ySegs = isMobile ? 22 : 35;
        const width = 6, height = 13;

        let scene, camera, renderer, particles = [], constraints = [], receiptMesh, geometry;
        let draggedParticle = null, dragPlane = new THREE.Plane(), raycaster = new THREE.Raycaster(), mouse = new THREE.Vector2();

        function createTexture() {
            const canvas = document.createElement('canvas');
            canvas.width = 512; canvas.height = 1024;
            const ctx = canvas.getContext('2d');
            ctx.fillStyle = '#fcfcfc'; ctx.fillRect(0, 0, 512, 1024);
            
            // 减少噪点循环次数提升性能
            for (let i = 0; i < 2000; i++) {
                ctx.fillStyle = `rgba(0,0,0,0.02)`;
                ctx.fillRect(Math.random() * 512, Math.random() * 1024, 2, 2);
            }

            ctx.fillStyle = '#111'; ctx.textAlign = 'center';
            ctx.font = '72px "Manufacturing Consent"';
            ctx.fillText('CHEAPER', 256, 110);
            ctx.fillText('BROTHERS', 256, 185);
            
            ctx.font = 'bold 24px monospace';
            ctx.fillText('--------------------------------', 256, 240);
            
            ctx.textAlign = 'left';
            ctx.font = 'bold 28px monospace';
            const items = ["∞ Amazon", "1x Walmart", "1x Doordash", "1x Uber Eats", "1x 悸动奶茶"];
            items.forEach((item, i) => {
                ctx.fillText(item, 50, 320 + i * 70);
                ctx.fillText("FREE", 380, 320 + i * 70);
            });

            ctx.textAlign = 'center';
            ctx.fillText('TOTAL: 0', 256, 850);
            return new THREE.CanvasTexture(canvas);
        }

        class Particle {
            constructor(x, y, z) { this.position = new THREE.Vector3(x, y, z); this.previous = new THREE.Vector3(x, y, z); this.isPinned = false; }
            integrate() {
                if(this.isPinned) return;
                let v = this.position.clone().sub(this.previous).multiplyScalar(DAMPING);
                this.previous.copy(this.position);
                this.position.add(v).add(GRAVITY.clone().multiplyScalar(TIMESTEP * TIMESTEP));
            }
        }

        return {
            init: () => {
                const container = document.getElementById('receipt-container');
                scene = new THREE.Scene();
                renderer = new THREE.WebGLRenderer({ antialias: false, alpha: true }); // 关闭抗锯齿提升性能
                renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2)); // 限制最高 DRP 为 2
                renderer.setSize(window.innerWidth, window.innerHeight);
                container.appendChild(renderer.domElement);

                camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 100);
                camera.position.z = isMobile ? 22 : 18;

                scene.add(new THREE.AmbientLight(0xffffff, 1.0));
                
                for (let v = 0; v <= ySegs; v++) {
                    for (let u = 0; u <= xSegs; u++) {
                        let p = new Particle((u/xSegs-0.5)*width, (0.5-v/ySegs)*height, 0);
                        if(v === 0) p.isPinned = true;
                        particles.push(p);
                    }
                }
                const idx = (u, v) => u + v * (xSegs + 1);
                for (let v = 0; v <= ySegs; v++) {
                    for (let u = 0; u <= xSegs; u++) {
                        const distH = width / xSegs, distV = height / ySegs;
                        if (u < xSegs) constraints.push({p1: particles[idx(u, v)], p2: particles[idx(u + 1, v)], dist: distH});
                        if (v < ySegs) constraints.push({p1: particles[idx(u, v)], p2: particles[idx(u, v + 1)], dist: distV});
                    }
                }

                geometry = new THREE.PlaneGeometry(width, height, xSegs, ySegs);
                receiptMesh = new THREE.Mesh(geometry, new THREE.MeshBasicMaterial({ map: createTexture(), side: THREE.DoubleSide, transparent: true }));
                scene.add(receiptMesh);
                
                // 触摸交互适配
                const handleStart = (e) => {
                    const touch = e.touches ? e.touches[0] : e;
                    mouse.x = (touch.clientX / window.innerWidth) * 2 - 1;
                    mouse.y = -(touch.clientY / window.innerHeight) * 2 + 1;
                    raycaster.setFromCamera(mouse, camera);
                    const intersects = raycaster.intersectObject(receiptMesh);
                    if(intersects.length > 0) {
                        draggedParticle = particles[intersects[0].face.a];
                        draggedParticle.isPinned = true;
                        dragPlane.setFromNormalAndCoplanarPoint(camera.getWorldDirection(new THREE.Vector3()), intersects[0].point);
                    }
                };
                container.addEventListener('touchstart', handleStart, {passive: false});
                container.addEventListener('mousedown', handleStart);

                animate();
            }
        };

        function animate() {
            requestAnimationFrame(animate);
            for(let p of particles) p.integrate();
            const iter = isMobile ? 6 : 12; // 手机端大幅减少迭代
            for(let i=0; i<iter; i++) {
                for(let c of constraints) {
                    let diff = new THREE.Vector3().subVectors(c.p2.position, c.p1.position);
                    let corr = diff.multiplyScalar(1 - c.dist / (diff.length() || 1)).multiplyScalar(0.5);
                    if(!c.p1.isPinned) c.p1.position.add(corr);
                    if(!c.p2.isPinned) c.p2.position.sub(corr);
                }
            }
            const pos = geometry.attributes.position.array;
            for(let i=0; i<particles.length; i++) {
                pos[i*3] = particles[i].position.x; pos[i*3+1] = particles[i].position.y; pos[i*3+2] = particles[i].position.z;
            }
            geometry.attributes.position.needsUpdate = true;
            renderer.render(scene, camera);
        }
    })();

    document.getElementById('fuzzy-about').addEventListener('click', () => {
        const container = document.getElementById('receipt-container');
        if(!container.classList.contains('active')) {
            setTimeout(() => ReceiptEngine.init(), 50); // 延迟启动，避免 UI 冻结
            container.classList.add('active');
            document.getElementById('about-content').style.opacity = '0.2';
        }
    });
</script>
</body>
</html>
