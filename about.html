<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="common.js"></script>

<script>
    // 1. Fuzzy 文字初始化
    new FuzzyText('fuzzy-about', { fontFamily: "Manufacturing Consent", text: "ABOUT", fontSize: 140 });

    // 2. 物理小票引擎 (系统字体 + 双行加粗 + 交互版)
    const ReceiptEngine = (() => {
        const DAMPING = 0.98;
        const TIMESTEP = 18 / 1000;
        const GRAVITY = new THREE.Vector3(0, -80, 0);
        const xSegs = 15, ySegs = 35, width = 6, height = 14;

        let scene, camera, renderer, particles = [], constraints = [], receiptMesh, geometry;
        let draggedParticle = null, dragPlane = new THREE.Plane(), raycaster = new THREE.Raycaster(), mouse = new THREE.Vector2();

        function createTexture() {
            const canvas = document.createElement('canvas');
            canvas.width = 512; canvas.height = 1024;
            const ctx = canvas.getContext('2d');
            ctx.fillStyle = '#fcfcfc'; ctx.fillRect(0, 0, 512, 1024);
            
            // 噪点
            for (let i = 0; i < 5000; i++) {
                ctx.fillStyle = `rgba(0,0,0,${Math.random() * 0.03})`;
                ctx.fillRect(Math.random() * 512, Math.random() * 1024, 2, 2);
            }

            // 使用系统字体 + 双行加粗 (无 Bug 方案)
            ctx.fillStyle = '#111'; ctx.textAlign = 'center';
            ctx.font = 'bold 80px sans-serif'; 
            ctx.fillText('CHEAPER', 256, 120);
            ctx.fillText('BROTHERS', 256, 205);
            
            ctx.font = '24px monospace';
            ctx.fillText('--------------------------------', 256, 250);
            
            ctx.textAlign = 'left';
            ctx.font = 'bold 26px monospace';
            const items = ["∞ Amazon", "1x Walmart", "1x Homedepot", "1x Doordash", "1x Uber Eats", "1x 悸动奶茶"];
            items.forEach((name, i) => {
                ctx.fillText(name, 50, 330 + i * 60);
                ctx.fillText("FREE", 380, 330 + i * 60);
            });

            ctx.textAlign = 'center';
            ctx.font = 'bold 36px monospace'; ctx.fillText('TOTAL: $0.00', 256, 850);
            for (let i = 0; i < 50; i++) {
                ctx.fillRect(60 + i * 8, 880, Math.random() * 6 + 1, 70);
            }
            return new THREE.CanvasTexture(canvas);
        }

        class P {
            constructor(x, y, z) {
                this.pos = new THREE.Vector3(x, y, z);
                this.old = new THREE.Vector3(x, y, z);
                this.pin = false;
            }
            update() { if(!this.pin) { let v = this.pos.clone().sub(this.old).multiplyScalar(DAMPING); this.old.copy(this.pos); this.pos.add(v).add(GRAVITY.clone().multiplyScalar(TIMESTEP*TIMESTEP)); }}
        }

        return {
            init: () => {
                const container = document.getElementById('receipt-container');
                scene = new THREE.Scene();
                camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
                camera.position.z = 20;

                renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
                renderer.setSize(window.innerWidth, window.innerHeight);
                renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2)); // 限制 DPR 保证流畅
                container.appendChild(renderer.domElement);

                scene.add(new THREE.AmbientLight(0xffffff, 1));
                
                for(let v=0; v<=ySegs; v++) {
                    for(let u=0; u<=xSegs; u++) {
                        let p = new P((u/xSegs-0.5)*width, (0.5-v/ySegs)*height, 0);
                        if(v === 0) p.pin = true;
                        particles.push(p);
                    }
                }
                const idx = (u, v) => u + v * (xSegs + 1);
                for(let v=0; v<=ySegs; v++) {
                    for(let u=0; u<=xSegs; u++) {
                        if(u<xSegs) constraints.push([particles[idx(u,v)], particles[idx(u+1,v)], width/xSegs]);
                        if(v<ySegs) constraints.push([particles[idx(u,v)], particles[idx(u,v+1)], height/ySegs]);
                    }
                }

                geometry = new THREE.PlaneGeometry(width, height, xSegs, ySegs);
                receiptMesh = new THREE.Mesh(geometry, new THREE.MeshBasicMaterial({ map: createTexture(), side: THREE.DoubleSide, transparent: true }));
                scene.add(receiptMesh);

                // --- 完整抓取逻辑恢复 ---
                const onDown = (e) => {
                    const cx = e.touches ? e.touches[0].clientX : e.clientX;
                    const cy = e.touches ? e.touches[0].clientY : e.clientY;
                    mouse.x = (cx / window.innerWidth) * 2 - 1;
                    mouse.y = -(cy / window.innerHeight) * 2 + 1;
                    raycaster.setFromCamera(mouse, camera);
                    const hits = raycaster.intersectObject(receiptMesh);
                    if(hits.length > 0) {
                        const hit = hits[0];
                        const face = hit.face;
                        draggedParticle = particles[face.a]; 
                        if(draggedParticle.pin && hit.point.y > height/2 - 0.5) { draggedParticle = null; return; }
                        draggedParticle.pin = true;
                        dragPlane.setFromNormalAndCoplanarPoint(camera.getWorldDirection(new THREE.Vector3()), hit.point);
                    }
                };
                const onMove = (e) => {
                    if(!draggedParticle) return;
                    const cx = e.touches ? e.touches[0].clientX : e.clientX;
                    const cy = e.touches ? e.touches[0].clientY : e.clientY;
                    mouse.x = (cx / window.innerWidth) * 2 - 1;
                    mouse.y = -(cy / window.innerHeight) * 2 + 1;
                    raycaster.setFromCamera(mouse, camera);
                    const target = new THREE.Vector3();
                    raycaster.ray.intersectPlane(dragPlane, target);
                    draggedParticle.pos.copy(target);
                };
                const onUp = () => { if(draggedParticle) { if(draggedParticle.pos.y < height/2 - 1) draggedParticle.pin = false; draggedParticle = null; }};

                window.addEventListener('mousedown', onDown);
                window.addEventListener('mousemove', onMove);
                window.addEventListener('mouseup', onUp);
                window.addEventListener('touchstart', onDown, {passive: false});
                window.addEventListener('touchmove', onMove, {passive: false});
                window.addEventListener('touchend', onUp);

                this.animate();
            },
            animate: function() {
                requestAnimationFrame(() => this.animate());
                for(let p of particles) p.update();
                for(let i=0; i<12; i++) {
                    for(let c of constraints) {
                        let diff = c[1].pos.clone().sub(c[0].pos);
                        let dist = diff.length();
                        let pull = (dist - c[2]) / dist * 0.5;
                        if(!c[0].pin) c[0].pos.add(diff.clone().multiplyScalar(pull));
                        if(!c[1].pin) c[1].pos.sub(diff.clone().multiplyScalar(pull));
                    }
                }
                const posArr = geometry.attributes.position.array;
                for(let i=0; i<particles.length; i++) {
                    posArr[i*3] = particles[i].pos.x; posArr[i*3+1] = particles[i].pos.y; posArr[i*3+2] = particles[i].pos.z;
                }
                geometry.attributes.position.needsUpdate = true;
                renderer.render(scene, camera);
            }
        };
    })();

    let triggered = false;
    document.getElementById('fuzzy-about').addEventListener('click', () => {
        if(!triggered) {
            ReceiptEngine.init();
            document.getElementById('receipt-container').classList.add('active');
            document.getElementById('about-content').style.opacity = '0.3';
            triggered = true;
        }
    });
</script>
