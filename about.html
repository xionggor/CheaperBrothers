<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>About - Cheaper Brothers</title>
    <link rel="stylesheet" href="common.css">
    <style>
        body {
            margin: 0; height: 100vh; display: flex; flex-direction: column;
            justify-content: center; align-items: center; background-color: #000;
            overflow: hidden; color: #fff; font-family: sans-serif;
        }
        #receipt-container {
            position: fixed; top: -110vh; left: 0; width: 100vw; height: 100vh;
            z-index: 2; pointer-events: none;
            transition: top 1s cubic-bezier(0.23, 1, 0.32, 1);
        }
        #receipt-container.active { top: 0; pointer-events: auto; }
        .about-main { text-align: center; z-index: 1; transition: opacity 0.5s; }
        canvas#fuzzy-about { cursor: pointer; max-width: 100%; }
        .font-preload { font-family: "Manufacturing Consent"; position: absolute; opacity: 0; }
    </style>
</head>
<body>

<div class="font-preload">LOAD</div>
<div id="receipt-container"></div>

<div class="about-main" id="about-content">
    <canvas id="fuzzy-about"></canvas>
    <div style="opacity:0.5; margin-top:10px;">CLICK TO DROP RECEIPT</div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="common.js"></script>

<script>
    // 1. 字体与基础文字
    new FuzzyText('fuzzy-about', { 
        fontFamily: "Manufacturing Consent", text: "ABOUT", fontSize: 120 
    });

    const ReceiptMobileOptimized = (() => {
        // 检测是否为移动端
        const isMobile = /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);
        
        // --- 性能参数调优 ---
        const DAMPING = 0.96;
        const iterations = isMobile ? 6 : 12; // 移动端减少物理迭代
        const xSegs = isMobile ? 10 : 15;      // 减少横向粒子
        const ySegs = isMobile ? 22 : 35;      // 减少纵向粒子
        const width = 6, height = 13;

        let scene, camera, renderer, particles = [], constraints = [], geometry, mesh;

        function createOptimizedTexture() {
            const canvas = document.createElement('canvas');
            canvas.width = 512; canvas.height = 1024;
            const ctx = canvas.getContext('2d');
            
            // 绘制底色
            ctx.fillStyle = '#fdfdfd'; ctx.fillRect(0, 0, 512, 1024);
            
            // 快速噪点生成 (优化版)
            ctx.fillStyle = "rgba(0,0,0,0.02)";
            for (let i = 0; i < (isMobile ? 2000 : 5000); i++) {
                ctx.fillRect(Math.random() * 512, Math.random() * 1024, 2, 2);
            }

            // 品牌文字：Manufacturing Consent 双行
            ctx.fillStyle = '#000'; ctx.textAlign = 'center';
            ctx.font = '72px "Manufacturing Consent"';
            ctx.fillText('CHEAPER', 256, 110);
            ctx.fillText('BROTHERS', 256, 185);
            
            ctx.font = '24px monospace';
            ctx.fillText('--------------------------------', 256, 230);
            
            // 列表内容 (严格遵循你的设计)
            ctx.textAlign = 'left';
            ctx.font = 'bold 26px monospace';
            const list = ["∞ Amazon", "1x Walmart", "1x Homedepot", "1x Doordash", "1x Uber Eats", "1x 悸动奶茶"];
            list.forEach((item, i) => {
                ctx.fillText(item, 50, 310 + i * 60);
                ctx.fillText("FREE", 380, 310 + i * 60);
            });

            ctx.textAlign = 'center';
            ctx.font = 'bold 38px monospace';
            ctx.fillText('TOTAL: $0.00', 256, 800);
            
            // 条形码逻辑
            for (let i = 0; i < 50; i++) {
                ctx.fillRect(60 + i * 8, 850, Math.random() * 5 + 1, 70);
            }

            return new THREE.CanvasTexture(canvas);
        }

        // 简易物理粒子
        class P {
            constructor(x, y) {
                this.pos = new THREE.Vector3(x, y, 0);
                this.old = new THREE.Vector3(x, y, 0);
                this.pin = false;
            }
            update() {
                if (this.pin) return;
                let vel = this.pos.clone().sub(this.old).multiplyScalar(DAMPING);
                this.old.copy(this.pos);
                this.pos.add(vel).add(new THREE.Vector3(0, -0.015, 0)); // 重力
            }
        }

        return {
            init: () => {
                const container = document.getElementById('receipt-container');
                scene = new THREE.Scene();
                camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 100);
                camera.position.z = isMobile ? 22 : 18;

                renderer = new THREE.WebGLRenderer({ antialias: !isMobile, alpha: true });
                renderer.setPixelRatio(isMobile ? 1.5 : window.devicePixelRatio); // 移动端限制 DPR 减轻 GPU 压力
                renderer.setSize(window.innerWidth, window.innerHeight);
                container.appendChild(renderer.domElement);

                // 生成粒子
                for (let v = 0; v <= ySegs; v++) {
                    for (let u = 0; u <= xSegs; u++) {
                        let p = new P((u / xSegs - 0.5) * width, (0.5 - v / ySegs) * height);
                        if (v === 0) p.pin = true;
                        particles.push(p);
                    }
                }

                // 生成约束
                const getIdx = (u, v) => u + v * (xSegs + 1);
                for (let v = 0; v <= ySegs; v++) {
                    for (let u = 0; u <= xSegs; u++) {
                        if (u < xSegs) constraints.push([particles[getIdx(u, v)], particles[getIdx(u + 1, v)], width / xSegs]);
                        if (v < ySegs) constraints.push([particles[getIdx(u, v)], particles[getIdx(u, v + 1)], height / ySegs]);
                    }
                }

                geometry = new THREE.PlaneGeometry(width, height, xSegs, ySegs);
                mesh = new THREE.Mesh(geometry, new THREE.MeshBasicMaterial({ map: createOptimizedTexture(), side: THREE.DoubleSide }));
                scene.add(mesh);
                
                this.animate();
            },
            animate: function() {
                requestAnimationFrame(() => this.animate());
                // 物理模拟
                for (let p of particles) p.update();
                for (let i = 0; i < iterations; i++) {
                    for (let c of constraints) {
                        let diff = c[1].pos.clone().sub(c[0].pos);
                        let dist = diff.length();
                        let pull = (dist - c[2]) / dist * 0.5;
                        if (!c[0].pin) c[0].pos.add(diff.clone().multiplyScalar(pull));
                        if (!c[1].pin) c[1].pos.sub(diff.clone().multiplyScalar(pull));
                    }
                }
                // 同步顶点
                const posArr = geometry.attributes.position.array;
                for (let i = 0; i < particles.length; i++) {
                    posArr[i * 3] = particles[i].pos.x;
                    posArr[i * 3 + 1] = particles[i].pos.y;
                    posArr[i * 3 + 2] = particles[i].pos.z;
                }
                geometry.attributes.position.needsUpdate = true;
                renderer.render(scene, camera);
            }
        };
    })();

    document.getElementById('fuzzy-about').addEventListener('click', () => {
        const container = document.getElementById('receipt-container');
        if(!container.classList.contains('active')) {
            ReceiptMobileOptimized.init();
            container.classList.add('active');
            document.getElementById('about-content').style.opacity = "0.2";
        }
    });
</script>
</body>
</html>
