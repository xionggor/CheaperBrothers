<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>订单管理系统 - Cheaper Brothers</title>
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">

<style>
  /* 暗黑模式重写 */
  html, body { margin: 0; padding: 0; font-family: -apple-system, sans-serif; background: #000; color: #fff; -webkit-tap-highlight-color: transparent;}
  .container { max-width: 600px; margin: 0 auto; padding: 12px; }
  
  /* 登录界面 */
  #authPage { padding-top: 60px; text-align: center; }
  .auth-card { background: #111; padding: 35px 25px; border-radius: 20px; border: 1px solid #333; }
  
  /* 顶部导航 */
  .header { display: flex; justify-content: space-between; align-items: center; padding: 5px 5px 20px 5px; margin-bottom: 10px; border-bottom: 1px solid #333;}
  .header h2 { margin: 0; font-size: 18px; color: #fff; font-weight: 500;}
  .logout-link { color: #888; font-size: 13px; cursor: pointer; text-decoration: underline; }

  /* 订单卡片 */
  .post { position: relative; background: #111; border: 1px solid #222; border-radius: 12px; padding: 15px; margin-bottom: 15px; }
  .post.refunded { filter: grayscale(1); opacity: 0.5; background: #0a0a0a; border-color: #111;}
  
  .info { font-size: 13px; line-height: 1.6; color: #ccc;}
  .info-row { display: flex; gap: 15px; margin-bottom: 4px; }
  .label-text { color: #666; margin-right: 3px; }

  /* 右侧状态区 */
  .status-box { position: absolute; top: 15px; right: 15px; display: flex; flex-direction: column; align-items: flex-end; gap: 6px; }
  .status-tag { font-size: 11px; padding: 4px 12px; border-radius: 20px; cursor: pointer; font-weight: bold; }
  .unrefunded { background: #fff; color: #000; }
  .refunded-tag { background: #333; color: #aaa; }
  
  /* 倒计时文字样式 */
  .countdown { font-size: 10px; color: #aaa; font-weight: bold; font-family: monospace; }
  .expired { color: #555; }
  .urgent { color: #ff4d4f; }

  .images { display: flex; gap: 8px; margin-top: 12px; overflow-x: auto; padding-bottom: 5px; }
  .images img { width: 60px; height: 60px; border-radius: 6px; object-fit: cover; flex-shrink: 0; background: #222; border: 1px solid #333; }
  
  .edit-btn { position: absolute; right: 15px; bottom: 15px; padding: 4px 12px; border-radius: 6px; background: #333; color: #fff; font-size: 11px; cursor: pointer; border: 1px solid #444;}
  .add-btn { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); padding: 12px 40px; border-radius: 40px; background: #fff; color: #000; border: none; font-size: 16px; font-weight: bold; box-shadow: 0 5px 20px rgba(255,255,255,0.2); z-index: 99; }
  
  /* 弹窗 */
  .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.8); display: none; z-index: 100; justify-content: center; align-items: center; padding: 15px; }
  .sheet { width: 100%; max-width: 450px; background: #111; border: 1px solid #333; border-radius: 20px; padding: 25px; max-height: 85vh; overflow-y: auto; box-sizing: border-box; }
  label { font-size: 13px; color: #888; display: block; margin-top: 15px; }
  input, select { width: 100%; margin-top: 6px; padding: 12px; border: 1px solid #333; border-radius: 10px; box-sizing: border-box; background: #000; color: #fff; }
  
  .submit-btn { background: #fff; color: #000; width: 100%; padding: 14px; border: none; border-radius: 30px; margin-top: 25px; cursor: pointer; font-weight: bold; }
  .delete-btn { background: transparent; color: #ff4d4f; width: 100%; padding: 10px; border: 1px solid #ff4d4f; border-radius: 30px; margin-top: 12px; cursor: pointer; font-size: 13px; }
  .preview-modal { position: fixed; inset: 0; background: rgba(0,0,0,0.95); display: none; z-index: 200; justify-content: center; align-items: center; }
  .preview-modal img { max-width: 95%; max-height: 95%; border-radius: 8px; }
</style>
</head>
<body>

<div class="nav-wrapper" id="navWrapper">
    <div class="nav-trigger" id="navTrigger"><canvas id="fuzzy-nav-icon"></canvas></div>
    <div class="menu-list">

                    <li class="sub-item"><a href="https://xionggor.github.io/poker/" target="_blank">(coming soon)</a></li>
                    <li class="sub-item"><a href="https://xionggor.dpdns.org/" target="_blank">TP Email</a></li>
                </ul>
            </div>
        </div>
        <div class="menu-bar" onclick="toggleAccordion(event, this)">
            <div class="bar-title"><div class="dot"></div>Art</div>
            <div class="sub-content">
                <ul class="sub-list">
                    <li class="sub-item"><a href="art-2024.html">2024</a></li>
                    <li class="sub-item"><a href="art-2025.html">2025</a></li>
                </ul>
            </div>
        </div>
        <a href="shop.html" class="menu-bar"><div class="bar-title">Shop</div></a>
        <a href="about.html" class="menu-bar"><div class="bar-title">About</div></a>
    </div>
</div>

<div id="authPage" class="container">
  <div class="auth-card">
    <h2 style="margin-top:0; color:#fff; font-weight:500;">ORDER SYSTEM</h2>
    <input type="text" id="username" placeholder="Username">
    <input type="password" id="password" placeholder="Password">
    <button class="submit-btn" onclick="handleAuth('login')">LOGIN</button>
    <button class="submit-btn" style="background:transparent; color:#fff; border:1px solid #fff; margin-top:10px;" onclick="handleAuth('register')">REGISTER</button>
  </div>
</div>

<div id="mainPage" style="display:none;">
  <div class="container">
    <div class="header">
      <h2>Order List</h2>
      <span class="logout-link" onclick="logout()">Logout</span>
    </div>
    <div id="list" style="padding-bottom: 100px;"></div>
  </div>
  <button class="add-btn" id="addBtn" onclick="openSheet()">+ NEW ORDER</button>
</div>

<div class="overlay" id="overlay" onclick="closeSheet()">
  <form class="sheet" onsubmit="submitOrder(event)" onclick="event.stopPropagation()">
    <h3 id="formTitle" style="margin-top:0; border-bottom:1px solid #333; padding-bottom:10px;">Order Details</h3>
    <label>Order No.</label><input id="orderNo" required>
    <label>Price ($)</label><input id="price" type="number" step="0.01" required>
    <label>Self Pay ($)</label><input id="selfPay" type="number" step="0.01" value="0">
    <label>Comment Type</label>
    <select id="commentType"><option value="免评">免评</option><option value="点星">点星</option><option value="评论">评论</option></select>
    <label>Order Date</label><input id="orderDate" type="date">
    <label id="arrivalLabel" style="display:none;">Arrival Date</label>
    <input id="arrivalDate" type="date" style="display:none;">
    
    <label style="color:#fff; font-weight:bold;">Upload Images</label>
    <input id="imageFiles" type="file" multiple accept="image/*" onchange="previewLocal()">
    <div id="localPreview" class="images"></div>
    
    <button class="submit-btn" type="submit" id="subBtn">SAVE</button>
    <button type="button" class="delete-btn" id="deleteBtn" onclick="deleteOrder()" style="display:none;">DELETE</button>
  </form>
</div>

<div class="preview-modal" id="imgPreview" onclick="this.style.display='none'"><img id="fullImg"></div>

<script src="common.js"></script>
<script>
// 这里是你原本所有的 JS 逻辑，原封不动！
const API_URL = 'https://script.google.com/macros/s/AKfycbwV2k-25S-EJelFrPOxuUyEWrr8TFEcklbwSzYdCAayIKp8aCLPXYc_7-yU00r1u1A8/exec';
let orders = [], editingIndex = null, currentUserId = localStorage.getItem('order_uid');

window.onload = () => { if(currentUserId) showMain(); };

function getCountdown(orderDateStr) {
  if (!orderDateStr) return "";
  const orderDate = new Date(orderDateStr);
  const expiryDate = new Date(orderDate);
  expiryDate.setDate(orderDate.getDate() + 25); 
  const now = new Date();
  const diff = expiryDate - now;
  if (diff <= 0) return '<span class="expired">⌛ Expired</span>';
  const days = Math.floor(diff / (1000 * 60 * 60 * 24));
  const hours = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
  const urgentClass = days < 3 ? 'urgent' : '';
  return `<span class="${urgentClass}">⌛ ${days}d ${hours}h</span>`;
}

async function api(data) { const res = await fetch(API_URL, { method: 'POST', body: JSON.stringify(data) }); return await res.json(); }

async function handleAuth(action) {
  const u = document.getElementById('username').value, p = document.getElementById('password').value;
  if(!u || !p) return alert("Please fill in both fields");
  const res = await api({ action, username: u, password: p });
  if(res.success) {
    if(action === 'register') alert("Registered successfully");
    else { currentUserId = res.userId; localStorage.setItem('order_uid', currentUserId); showMain(); }
  } else alert(res.message);
}

function logout() { localStorage.removeItem('order_uid'); location.reload(); }
function showMain() { document.getElementById('authPage').style.display='none'; document.getElementById('mainPage').style.display='block'; refreshList(); }

async function refreshList() {
  const listEl = document.getElementById('list');
  listEl.innerHTML = '<p style="text-align:center; color:#666; margin-top:20px;">Loading...</p>';
  const res = await api({ action: 'getOrders', userId: currentUserId });
  if(res.success) {
    orders = res.orders;
    listEl.innerHTML = orders.length ? '' : '<p style="text-align:center; color:#666; margin-top:50px;">No Orders</p>';
    orders.forEach((o, i) => renderOrder(o, i));
  }
}

function renderOrder(o, i) {
  const post = document.createElement('div');
  post.className = 'post' + (o.refundStatus ? ' refunded' : '');
  post.innerHTML = `
    <div class="info">
      <div class="info-row"><span><span class="label-text">No:</span>${o.orderNo}</span><span><span class="label-text">Type:</span>${o.commentType}</span></div>
      <div class="info-row"><span><span class="label-text">Price:</span>$${o.price}</span><span><span class="label-text">Self:</span>$${o.selfPay}</span></div>
      <div class="info-row"><span><span class="label-text">Date:</span>${o.orderDate}</span><span><span class="label-text">Arr:</span>${o.arrivalDate || '-'}</span></div>
    </div>
    <div class="status-box">
      <div class="status-tag ${o.refundStatus ? 'refunded-tag' : 'unrefunded'}">${o.refundStatus ? 'Refunded' : 'Pending'}</div>
      <div class="countdown">${o.refundStatus ? '' : getCountdown(o.orderDate)}</div>
    </div>
    <div class="images">${o.imageUrl.map(src => `<img src="${src}" onclick="showFull('${src}')">`).join('')}</div>
    <div class="edit-btn" onclick="openSheet(${i})">EDIT</div>
  `;
  const tag = post.querySelector('.status-tag');
  tag.onclick = async (e) => {
    e.stopPropagation(); o.refundStatus = !o.refundStatus;
    post.classList.toggle('refunded', o.refundStatus);
    tag.textContent = o.refundStatus ? 'Refunded' : 'Pending';
    tag.className = `status-tag ${o.refundStatus ? 'refunded-tag' : 'unrefunded'}`;
    post.querySelector('.countdown').innerHTML = o.refundStatus ? '' : getCountdown(o.orderDate);
    await api({ action: 'saveOrder', userId: currentUserId, order: o });
  };
  document.getElementById('list').appendChild(post);
}

async function processImages(files) {
  const results = [];
  for (let file of files) {
    const base64 = await new Promise((resolve) => {
      const reader = new FileReader(); reader.readAsDataURL(file);
      reader.onload = (e) => {
        const img = new Image(); img.src = e.target.result;
        img.onload = () => {
          const canvas = document.createElement('canvas');
          let w = img.width, h = img.height, max = 800;
          if (w > max) { h = Math.round((h * max) / w); w = max; }
          canvas.width = w; canvas.height = h;
          canvas.getContext('2d').drawImage(img, 0, 0, w, h);
          resolve(canvas.toDataURL('image/jpeg', 0.6));
        };
      };
    });
    results.push(base64);
  }
  return results;
}

async function submitOrder(e) {
  e.preventDefault();
  const btn = document.getElementById('subBtn'); btn.disabled = true; btn.textContent = "Processing...";
  const files = document.getElementById('imageFiles').files;
  let imgData = [];
  if(files.length > 0) imgData = await processImages(files);
  else if(editingIndex !== null) imgData = orders[editingIndex].imageUrl;

  const data = {
    orderId: editingIndex !== null ? orders[editingIndex].orderId : null,
    orderNo: document.getElementById('orderNo').value, price: document.getElementById('price').value,
    selfPay: document.getElementById('selfPay').value, commentType: document.getElementById('commentType').value,
    orderDate: document.getElementById('orderDate').value, arrivalDate: document.getElementById('arrivalDate').value,
    refundStatus: editingIndex !== null ? orders[editingIndex].refundStatus : false, imageUrl: imgData
  };
  const res = await api({ action: 'saveOrder', userId: currentUserId, order: data });
  if(res.success) { closeSheet(); refreshList(); }
  btn.disabled = false; btn.textContent = "SAVE";
}

function openSheet(idx = null) {
  editingIndex = idx; document.getElementById('overlay').style.display='flex'; document.getElementById('localPreview').innerHTML='';
  if(idx !== null) {
    const o = orders[idx]; document.getElementById('formTitle').textContent='Edit Order';
    document.getElementById('orderNo').value=o.orderNo; document.getElementById('price').value=o.price;
    document.getElementById('selfPay').value=o.selfPay; document.getElementById('commentType').value=o.commentType;
    document.getElementById('orderDate').value=o.orderDate; document.getElementById('arrivalDate').value=o.arrivalDate || '';
    document.getElementById('arrivalDate').style.display='block'; document.getElementById('arrivalLabel').style.display='block';
    document.getElementById('deleteBtn').style.display='block';
  } else {
    document.getElementById('formTitle').textContent='New Order'; document.querySelector('form').reset();
    document.getElementById('orderDate').value = new Date().toISOString().split('T')[0];
    document.getElementById('arrivalDate').style.display='none'; document.getElementById('arrivalLabel').style.display='none';
    document.getElementById('deleteBtn').style.display='none';
  }
}

function closeSheet() { document.getElementById('overlay').style.display='none'; }
function previewLocal() {
  const div = document.getElementById('localPreview'); div.innerHTML='';
  [...document.getElementById('imageFiles').files].forEach(f => {
    const img = document.createElement('img'); img.src = URL.createObjectURL(f); div.appendChild(img);
  });
}
function showFull(s) { document.getElementById('fullImg').src=s; document.getElementById('imgPreview').style.display='flex'; }
async function deleteOrder() {
  if(!confirm("Delete this order?")) return;
  const res = await await api({ action: 'deleteOrder', userId: currentUserId, orderId: orders[editingIndex].orderId });
  if(res.success) { closeSheet(); refreshList(); }
}
</script>
</body>
</html>
