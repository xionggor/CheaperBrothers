<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shop - Cheaper Brothers</title>

<link rel="stylesheet" href="common.css">

<style>
/* SHOP 独有样式 */
body { margin: 0; background-color: #000; color: #fff; display: flex; flex-direction: column; align-items: center; min-height: 100vh; overflow-x: hidden; -webkit-tap-highlight-color: transparent; }
.header-section { margin-top: 10vh; margin-bottom: 2vh; display: flex; flex-direction: column; align-items: center; }
canvas { cursor: pointer; max-width: 100%; }
.categories { display: flex; gap: 25px; margin-top: 25px; margin-bottom: 50px; }
.cat-item { font-family: "Alumni Sans Pinstripe", sans-serif; font-size: 1.6rem; font-weight: 400; letter-spacing: 2px; cursor: pointer; opacity: 0.2; transition: opacity 0.4s ease; text-transform: uppercase; padding: 5px; }
.cat-item.active { opacity: 1; text-decoration: underline; text-underline-offset: 6px; }
.shop-grid { width: 90%; max-width: 1200px; display: grid; grid-template-columns: repeat(4, 1fr); gap: 40px 20px; margin-bottom: 80px; }
.product-card { text-decoration: none; color: inherit; display: flex; flex-direction: column; align-items: center; width: 100%; opacity: 0; transform: translateY(10px); animation: fadeIn 0.5s forwards; outline: none; }
@keyframes fadeIn { to { opacity: 1; transform: translateY(0); } }
.image-wrapper { width: 100%; aspect-ratio: 1 / 1; background-color: #000; overflow: hidden; border: none !important; outline: none !important; display: flex; align-items: center; justify-content: center; }
.image-wrapper img { width: 101%; height: 101%; object-fit: cover; display: block; border: 0; outline: none; image-rendering: -webkit-optimize-contrast; }
.product-info { text-align: center; margin-top: 12px; width: 100%; height: 60px; display: flex; flex-direction: column; justify-content: flex-start; }
.product-name { font-family: "Alumni Sans Pinstripe", sans-serif; font-size: 1.6rem; font-weight: 400; margin: 0; line-height: 0.9; letter-spacing: 0.5px; text-transform: uppercase; }
.product-price { font-family: "Alumni Sans Pinstripe", sans-serif; font-size: 1rem; opacity: 0.4; margin-top: 4px; display: block; }

@media (max-width: 600px) {
    .shop-grid { grid-template-columns: repeat(2, 1fr); gap: 20px 15px; width: 94%; }
    .cat-item { font-size: 1.2rem; }
    .product-info { height: 50px; }
}
</style>
</head>
<body>

<div id="font-loader">Force Font Load</div>

<div class="nav-wrapper" id="navWrapper">
    <div class="nav-trigger" id="navTrigger"><canvas id="fuzzy-nav-icon"></canvas></div>
    <div class="menu-list">
        <div class="menu-bar" onclick="toggleAccordion(event, this)">
            <div class="bar-title"><div class="dot"></div>APPS</div>
            <div class="sub-content">
                <ul class="sub-list">
                    <li class="sub-item"><a href="PokerTracker.html">POKER TRACKER</a></li>
                    <li class="sub-item"><a href="lottery.html">LOTTERY</a></li>
                    <li class="sub-item"><a href="https://xionggor.github.io/poker/" target="_blank">(coming soon)</a></li>
                    <li class="sub-item"><a href="https://xionggor.dpdns.org/" target="_blank">TP Email</a></li>
                </ul>
            </div>
        </div>
        <div class="menu-bar" onclick="toggleAccordion(event, this)">
            <div class="bar-title"><div class="dot"></div>Art</div>
            <div class="sub-content">
                <ul class="sub-list">
                    <li class="sub-item"><a href="art-2024.html">2024</a></li>
                    <li class="sub-item"><a href="art-2025.html">2025</a></li>
                </ul>
            </div>
        </div>
        <a href="shop.html" class="menu-bar"><div class="bar-title">Shop</div></a>
        <a href="about.html" class="menu-bar"><div class="bar-title">About</div></a>
    </div>
</div>

<div class="header-section">
  <canvas id="fuzzy-shop-title"></canvas>
  <div class="categories">
    <div class="cat-item active" onclick="updateShop('new', event)">New 2026</div>
    <div class="cat-item" onclick="updateShop('apparel', event)">Apparel</div>
    <div class="cat-item" onclick="updateShop('acc', event)">Accessories</div>
  </div>
</div>

<div class="shop-grid" id="productContainer"></div>

<footer class="global-footer" style="margin-top:50px;"><a href="index.html">Cheaper Brothers Co. 廉兄集团</a></footer>

<script src="common.js"></script>
<script>
// 商品数据与业务逻辑
const shopData = {
    apparel: [
        { name: "Cheaper Brothers Sticker", price: "$6.66", img: "https://telegraph-image-afv.pages.dev/file/AgACAgEAAyEGAAShflOnAAMMaYtq03RWauGhNf8eUiY4mr5DQUYAAqQLaxs0_2FEc193FIxlGREBAAMCAAN4AAM6BA.jpg" },
        { name: "Cheaper Brothers Sticker", price: "$6.66", img: "https://telegraph-image-afv.pages.dev/file/AgACAgEAAyEGAAShflOnAAMNaYtq4WAFO-Rf057S5Q7FpNtKNv4AAqULaxs0_2FE2PrwRSahoOoBAAMCAAN4AAM6BA.jpg" },
        { name: "Cheaper Brothers Sticker *2024", price: "$6.66", img: "https://telegraph-image-afv.pages.dev/file/AgACAgEAAyEGAAShflOnAAMOaYtrNMs8jYVOgO_8iXKr18AJmXkAAqYLaxs0_2FEZQPb9fCm7ZgBAAMCAAN4AAM6BA.jpg" }
    ],
    acc: [
        { name: "Cheaper Brand Poker Chip", price: "$6.66", img: "https://telegraph-image-afv.pages.dev/file/AgACAgEAAyEGAAShflOnAAMJaYtqKxjZAfhvxXEcybjYfQNtmrUAAqELaxs0_2FEqDynOQ5u4u0BAAMCAAN4AAM6BA.jpg" },
        { name: "Cheaper Brand Poker Chip", price: "$6.66", img: "https://telegraph-image-afv.pages.dev/file/AgACAgEAAyEGAAShflOnAAMKaYtqfOW7Af15MhVjGcCJQd0_z_gAAqILaxs0_2FEyz6s3TjbySYBAAMCAAN4AAM6BA.jpg" },
        { name: "Cheaper Brand Poker Chip", price: "$6.66", img: "https://telegraph-image-afv.pages.dev/file/AgACAgEAAyEGAAShflOnAAMLaYtqhjfeTuRn82RaXIl1e-Ld80IAAqMLaxs0_2FErDf7VBeF9I0BAAMCAAN4AAM6BA.jpg" }
    ]
};
shopData.new = [...shopData.apparel, ...shopData.acc].sort(() => Math.random() - 0.5);

function updateShop(category, event) {
    const container = document.getElementById('productContainer');
    const items = shopData[category];
    if(event) {
        document.querySelectorAll('.cat-item').forEach(el => el.classList.remove('active'));
        event.currentTarget.classList.add('active');
    }
    container.innerHTML = "";
    items.forEach((item, index) => {
        const card = document.createElement('a');
        card.href = "#"; card.className = "product-card"; card.style.animationDelay = `${index * 0.05}s`;
        card.innerHTML = `<div class="image-wrapper"><img src="${item.img}" alt=""></div><div class="product-info"><h3 class="product-name">${item.name}</h3><span class="product-price">${item.price}</span></div>`;
        container.appendChild(card);
    });
}
window.onload = () => { updateShop('new'); };

// 初始化 SHOP 模糊字
new FuzzyText('fuzzy-shop-title', { fontFamily: "Manufacturing Consent", text: "SHOP", fontSize: 80, baseIntensity: 0.15, hoverIntensity: 0.5 });
</script>
</body>
</html>
