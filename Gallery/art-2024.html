<!DOCTYPE html>

    <title>2024 Gallery - Cheaper Brothers</title>
    <link rel="stylesheet" href="common.css">
    <style>
        body { margin: 0; height: 100vh; display: flex; flex-direction: column; background-color: #000; color: #fff; font-family: "Inter", sans-serif; overflow: hidden; }
        .main-content { flex: 1; display: flex; flex-direction: column; justify-content: center; align-items: center; width: 100%; }
        
        /* 画廊展示框 */
        .gallery-artwork {
            max-width: 280px; 
            width: 75vw;
            box-shadow: 0 15px 40px rgba(0,0,0,0.8); /* 强烈的阴影突出画作 */
            border: 2px solid #1a1a1a;
            border-radius: 2px;
            display: block;
            margin-bottom: 20px;
            transition: transform 0.4s ease;
        }
        .gallery-artwork:hover { transform: scale(1.02); }

        /* 博物馆风格铭牌 */
        .gallery-label {
            font-family: "Noto Serif TC", serif;
            font-style: italic;
            font-size: 1.1rem;
            color: #888;
            letter-spacing: 3px;
            text-align: center;
        }

        .global-footer { padding-bottom: 40px; width: 100%; text-align: center; z-index: 10; }
        .global-footer a { color: #fff; text-decoration: none; font-size: 14px; letter-spacing: 2px; opacity: 0.6; transition: opacity 0.3s; }
        .global-footer a:hover { opacity: 1; }
        @media (max-width: 768px) { .global-footer { padding-bottom: 20px; } .gallery-artwork { max-width: 220px; } }
    </style>
</head>
