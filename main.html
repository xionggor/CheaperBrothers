<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cheaper Brothers - 官方主页</title>
    
    </head>
<body>

    <main class="container section">
        <h1 style="text-align: center; margin-top: 150px; font-size: 3rem;">
            Cheaper Brothers 官方主页
        </h1>
        <p style="text-align: center; color: #666; margin-top: 20px;">
            页面内容正在建设中...<br>
            （导航栏应该会在顶部成功显示）
        </p>
    </main>

    <script src="common.js"></script>
    <script>
        // 确保页面加载完成后执行，更安全
        window.addEventListener('DOMContentLoaded', () => {
            if (typeof renderGlobalUI === 'function') {
                renderGlobalUI();
                console.log('导航栏已成功渲染');
            } else {
                console.error('未找到 renderGlobalUI 函数，请检查 common.js 是否正确加载。');
            }
        });
    </script>
</body>
</html>
