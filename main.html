<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cheaper Brothers Inc. — Bespoke Signage & Printing</title>
  <meta name="description" content="NYC-based premium bespoke print and signage studio specializing in custom vinyl decals, digital printing, light boxes, and neon signs." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />

  <style>
    :root {
      /* Palette (Apple Classic Light Theme) */
      --bg: #ffffff;
      --surface: #f5f5f7;
      --surface-hover: #e8e8ed;
      --border: #d2d2d7;
      --border-light: #e5e5ea;
      --text-primary: #1d1d1f;
      --text-secondary: #515154;
      --text-muted: #86868b;
      --accent-blue: #0071e3; /* Apple Blue accent */
      --accent-amber: #f56300;
      --accent-mint: #00c78b;
      --accent-dim: rgba(0, 113, 227, 0.08);

      /* Typography */
      --font-display: 'Bebas Neue', sans-serif;
      --font-body: 'DM Sans', sans-serif;
      --font-mono: 'JetBrains Mono', monospace;

      /* Spacing */
      --space-xs: 4px;
      --space-sm: 8px;
      --space-md: 16px;
      --space-lg: 24px;
      --space-xl: 32px;
      --space-2xl: 48px;
      --space-3xl: 64px;
      --space-4xl: 96px;
      --space-5xl: 128px;

      /* Layout */
      --max-w: 1280px;
      --gutter: 48px;

      /* Transitions */
      --ease-expo: cubic-bezier(0.16, 1, 0.3, 1);
      --ease-smooth: cubic-bezier(0.25, 0.46, 0.45, 0.94);
      --duration-fast: 0.2s;
      --duration-med: 0.4s;
      --duration-slow: 0.6s;
    }

    @media (max-width: 900px) {
      :root { --gutter: 20px; --space-3xl: 48px; --space-4xl: 64px; --space-5xl: 80px; }
    }
  </style>

  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    html {
      scroll-behavior: smooth;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    body {
      font-family: var(--font-body);
      background: var(--bg);
      color: var(--text-primary);
      line-height: 1.6;
      overflow-x: hidden;
    }

    ::selection { background: var(--accent-blue); color: #fff; }

    a { color: inherit; text-decoration: none; }
    img { max-width: 100%; display: block; }

    /* ===== Typography ===== */
    .display {
      font-family: var(--font-display);
      font-weight: 400;
      letter-spacing: 0.02em;
      text-transform: uppercase;
      line-height: 0.88;
    }

    .mono {
      font-family: var(--font-mono);
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }

    .label {
      font-family: var(--font-mono);
      font-size: 0.6rem;
      font-weight: 500;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--text-muted);
    }

    /* ===== Utility ===== */
    .container {
      max-width: var(--max-w);
      margin: 0 auto;
      padding: 0 var(--gutter);
    }

    .section {
      padding: var(--space-5xl) 0;
    }

    .section-header {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      padding-bottom: var(--space-md);
      margin-bottom: var(--space-3xl);
      border-bottom: 1px solid var(--border);
    }

    .section-header h2 {
      font-family: var(--font-display);
      font-size: clamp(2rem, 4vw, 3rem);
      letter-spacing: 0.02em;
      line-height: 0.9;
    }

    /* ===== Noise Overlay ===== */
    .noise::after {
      content: '';
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 9999;
      opacity: 0.03;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
      background-repeat: repeat;
      background-size: 256px 256px;
    }

    /* ===== Grid Lines (decorative) ===== */
    .grid-lines {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
      display: grid;
      grid-template-columns: repeat(6, 1fr);
      gap: var(--gutter);
      padding: 0 var(--gutter);
      max-width: var(--max-w);
      margin: 0 auto;
    }
    .grid-lines span {
      border-left: 1px solid var(--border-light);
      height: 100%;
      opacity: 0.4;
    }
    .grid-lines span:last-child { border-right: 1px solid var(--border-light); }

    /* ===== Reveal Animation ===== */
    .reveal {
      opacity: 0;
      transform: translateY(24px);
      transition: opacity var(--duration-slow) var(--ease-expo),
                  transform var(--duration-slow) var(--ease-expo);
    }
    .reveal.visible {
      opacity: 1;
      transform: translateY(0);
    }
    .reveal-delay-1 { transition-delay: 0.08s; }
    .reveal-delay-2 { transition-delay: 0.16s; }
    .reveal-delay-3 { transition-delay: 0.24s; }
    .reveal-delay-4 { transition-delay: 0.32s; }
    .reveal-delay-5 { transition-delay: 0.40s; }
  </style>

  <style>
    .ph {
      background: linear-gradient(135deg, #f5f5f7 0%, #ebebef 100%);
      border: 1px solid #d2d2d7;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family: var(--font-mono);
      font-size: 0.55rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: #86868b;
      overflow: hidden;
      flex-shrink: 0;
      position: relative;
      transition: border-color var(--duration-fast), background var(--duration-fast);
    }
    .ph:hover {
      border-color: var(--accent-blue);
      background: linear-gradient(135deg, #ffffff 0%, #f5f5f7 100%);
    }
    .ph .shape {
      margin-bottom: var(--space-sm);
      flex-shrink: 0;
      transition: all var(--duration-fast);
    }
    .ph:hover .shape {
      border-color: var(--accent-blue) !important;
      background-color: var(--accent-blue) !important;
    }
    .ph .shape.rect { width: 40px; height: 40px; border: 2px solid #86868b; }
    .ph .shape.circle { width: 40px; height: 40px; border: 2px solid #86868b; border-radius: 50%; }
    .ph .shape.diamond { width: 36px; height: 36px; border: 2px solid #86868b; transform: rotate(45deg); }
    .ph .shape.hex {
      clip-path: polygon(25% 0%, 75% 0%, 100% 50%, 75% 100%, 25% 100%, 0% 50%);
      background: #86868b; width: 48px; height: 40px;
    }
    .ph .shape.tri {
      width: 0; height: 0;
      border-left: 20px solid transparent;
      border-right: 20px solid transparent;
      border-bottom: 34px solid #86868b;
    }
    .ph .shape.cross { position: relative; width: 32px; height: 32px; }
    .ph .shape.cross::before,
    .ph .shape.cross::after { content: ''; position: absolute; background: #86868b; }
    .ph .shape.cross::before { width: 100%; height: 60%; top: 20%; left: 0; }
    .ph .shape.cross::after  { width: 60%; height: 100%; top: 0; left: 20%; }

    /* ── Badge ── */
    .badge {
      display: inline-block;
      padding: 3px 12px;
      border: 1px solid #d2d2d7;
      font-family: var(--font-mono);
      font-size: 0.55rem;
      font-weight: 500;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: #86868b;
      transition: border-color var(--duration-fast), color var(--duration-fast);
    }
    .badge:hover { border-color: var(--accent-blue); color: var(--accent-blue); }
  </style>

  <style>
    .header {
      position: sticky;
      top: 0;
      z-index: 100;
      background: rgba(255, 255, 255, 0.85);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
    }
    .header-inner {
      max-width: var(--max-w);
      margin: 0 auto;
      padding: 16px var(--gutter);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .header-logo {
      font-family: var(--font-display);
      font-size: 1.25rem;
      letter-spacing: 0.04em;
      line-height: 1;
    }
    .header-logo small {
      font-family: var(--font-body);
      font-weight: 400;
      font-size: 0.7rem;
      color: var(--text-muted);
      letter-spacing: 0;
      text-transform: none;
      margin-left: 4px;
    }
    .header-nav { display: flex; gap: var(--space-xl); }
    .header-nav a {
      font-family: var(--font-body);
      font-weight: 500;
      font-size: 0.78rem;
      color: var(--text-secondary);
      transition: color var(--duration-fast);
      position: relative;
    }
    .header-nav a::after {
      content: '';
      position: absolute;
      bottom: -4px;
      left: 0;
      width: 0;
      height: 1.5px;
      background: var(--accent-blue);
      transition: width var(--duration-med) var(--ease-expo);
    }
    .header-nav a:hover { color: var(--text-primary); }
    .header-nav a:hover::after { width: 100%; }
    .header-nav a.active { color: var(--accent-blue); }
    .header-nav a.active::after { width: 100%; }

    .hamburger {
      display: none;
      flex-direction: column;
      gap: 5px;
      cursor: pointer;
      background: none;
      border: none;
      padding: 4px;
    }
    .hamburger span {
      display: block;
      width: 22px;
      height: 2px;
      background: var(--text-primary);
      transition: all var(--duration-med) var(--ease-expo);
    }
    .hamburger.active span:nth-child(1) { transform: rotate(45deg) translate(5px, 5px); }
    .hamburger.active span:nth-child(2) { opacity: 0; }
    .hamburger.active span:nth-child(3) { transform: rotate(-45deg) translate(5px, -5px); }
  </style>

  <style>
    .hero {
      position: relative;
      padding: var(--space-5xl) 0;
      overflow: hidden;
    }
    .hero::before {
      content: '';
      position: absolute;
      top: -20%;
      right: -10%;
      width: 600px;
      height: 600px;
      background: radial-gradient(circle, var(--accent-dim) 0%, transparent 70%);
      pointer-events: none;
    }
    .hero-content { position: relative; z-index: 1; }
    .hero-headline {
      font-family: var(--font-display);
      font-size: clamp(3.5rem, 10vw, 8rem);
      letter-spacing: 0.01em;
      line-height: 0.85;
      text-transform: uppercase;
    }
    .hero-headline .thin { font-weight: 400; color: var(--text-muted); }
    .hero-headline .glow {
      color: var(--accent-blue);
      text-shadow: 0 0 40px rgba(0, 113, 227, 0.15),
                   0 0 80px rgba(0, 113, 227, 0.08);
    }
    .hero-meta {
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
      margin-top: var(--space-3xl);
      gap: var(--space-xl);
      flex-wrap: wrap;
    }
    .hero-desc {
      max-width: 500px;
      font-size: 0.9rem;
      color: var(--text-secondary);
      line-height: 1.8;
    }
    .hero-desc .tagline {
      font-family: var(--font-mono);
      font-size: 0.65rem;
      letter-spacing: 0.08em;
      color: var(--text-muted);
      display: block;
      margin-top: var(--space-md);
    }
    .hero-specs {
      display: flex;
      gap: var(--space-2xl);
      flex-wrap: wrap;
    }
    .spec-item { text-align: right; }
    .spec-item .mono {
      font-size: 0.65rem;
      font-weight: 400;
      color: var(--text-muted);
      margin-bottom: var(--space-xs);
    }
    .spec-item .value {
      font-weight: 700;
      font-size: 1rem;
      color: var(--text-primary);
    }

    .hero-cta {
      display: inline-flex;
      align-items: center;
      gap: var(--space-sm);
      margin-top: var(--space-2xl);
      padding: 14px 32px;
      background: var(--text-primary);
      color: #ffffff;
      font-weight: 700;
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      border: none;
      cursor: pointer;
      transition: background var(--duration-fast), transform var(--duration-fast) var(--ease-expo);
      font-family: var(--font-body);
    }
    .hero-cta:hover {
      background: var(--accent-blue);
      color: #ffffff;
      transform: translateY(-2px);
    }
  </style>

  <style>
    .work-section {
      background: var(--surface);
      border-top: 1px solid var(--border);
      border-bottom: 1px solid var(--border);
    }

    .project-row {
      display: grid;
      grid-template-columns: 48px minmax(200px, 2.5fr) 1.2fr 80px 40px;
      align-items: center;
      padding: 24px var(--space-md);
      border-bottom: 1px solid var(--border-light);
      cursor: pointer;
      transition: background var(--duration-fast), padding-left var(--duration-fast);
      position: relative;
    }
    .project-row::before {
      content: '';
      position: absolute;
      left: 0;
      top: 0;
      bottom: 0;
      width: 0;
      background: var(--accent-blue);
      transition: width var(--duration-med) var(--ease-expo);
    }
    .project-row.active-row::before { width: 3px; }
    .project-row:last-child { border-bottom: none; }
    .project-row:hover { background: var(--surface-hover); padding-left: 28px; }

    .project-row .num {
      font-weight: 700;
      font-size: 0.75rem;
      color: var(--text-muted);
      transition: color var(--duration-fast), transform var(--duration-fast);
    }
    .project-row:hover .num { color: var(--accent-blue); }
    .project-row .name {
      font-weight: 700;
      font-size: 1rem;
      transition: transform var(--duration-fast);
    }
    .project-row:hover .name { transform: translateX(6px); }
    .project-row .material {
      font-family: var(--font-mono);
      font-size: 0.6rem;
      letter-spacing: 0.06em;
      color: var(--text-muted);
      text-transform: uppercase;
    }
    .project-row .year {
      color: var(--text-muted);
      font-size: 0.8rem;
      text-align: center;
      font-weight: 400;
    }
    .project-row .arrow {
      text-align: right;
      font-
